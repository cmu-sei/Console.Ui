<crucible-dialog
  [dialogTitle]="title"
  [form]="form"
  submitLabel="Send"
  [guardUnsavedWork]="form.dirty"
  (submit)="send()"
>
  <div crucibleDialogContent [formGroup]="form" class="send-text-content">
    <div class="send-text-toolbar">
      <button
        mat-icon-button
        type="button"
        [matMenuTriggerFor]="advancedTextMenu"
        aria-label="Paste speed settings"
        matTooltip="Paste speed settings"
      >
        <mat-icon svgIcon="gear"></mat-icon>
      </button>
    </div>
    <mat-menu #advancedTextMenu="matMenu">
      <button type="button" mat-menu-item [matMenuTriggerFor]="pasteMenu">
        <span
          matTooltip="Delay between sending each line. Go slower if paste errors are occurring."
          matTooltipPosition="above"
        >
          Paste Speed
        </span>
      </button>
    </mat-menu>
    <mat-menu #pasteMenu="matMenu">
      @for (
        pasteSpeed of settingsService.settings.PasteSpeeds;
        track pasteSpeed
      ) {
        <button
          type="button"
          mat-menu-item
          (click)="setPasteSpeed(pasteSpeed.value)"
        >
          {{ pasteSpeed.name }}
        </button>
      }
    </mat-menu>

    <mat-form-field>
      <textarea
        matInput
        formControlName="textToSend"
        cdkFocusInitial
        aria-label="Text to send"
      ></textarea>
    </mat-form-field>
  </div>
</crucible-dialog>
