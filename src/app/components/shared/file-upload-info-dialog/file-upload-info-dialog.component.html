<crucible-dialog
  [dialogTitle]="title"
  [form]="form"
  submitLabel="Done"
  [guardUnsavedWork]="form.dirty"
  (submit)="done()"
>
  <div crucibleDialogContent [formGroup]="form" class="upload-info-fields">
    <mat-form-field>
      <mat-label>File Path</mat-label>
      <input matInput formControlName="filepath" cdkFocusInitial />
    </mat-form-field>
    @if (showCredentials) {
      <mat-form-field>
        <mat-label>VM Username</mat-label>
        <input matInput formControlName="username" autocomplete="username" />
      </mat-form-field>
      <mat-form-field>
        <mat-label>VM Password</mat-label>
        <input
          matInput
          type="password"
          formControlName="password"
          autocomplete="current-password"
        />
      </mat-form-field>
    }
  </div>
</crucible-dialog>
