<crucible-dialog
  dialogTitle="File Upload in Progress"
  loading
  [hideDefaultActions]="true"
>
  <div crucibleDialogContent class="progress-content">
    <mat-progress-spinner
      mode="indeterminate"
      diameter="48"
      aria-label="Uploading file"
    ></mat-progress-spinner>
  </div>
  <ng-container crucibleDialogActions>
    <button matButton="outlined" type="button" mat-dialog-close cdkFocusInitial>
      Close
    </button>
  </ng-container>
</crucible-dialog>
